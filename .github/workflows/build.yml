name: Build & Deploy ray.so

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Package standalone
        run: |
          # Copy standalone output as base
          cp -r .next/standalone standalone-app

          # Standalone needs .next/static from the main build
          mkdir -p standalone-app/.next
          cp -r .next/static standalone-app/.next/static

          # Copy BUILD_ID and other essential .next files
          cp .next/BUILD_ID standalone-app/.next/BUILD_ID
          cp .next/build-manifest.json standalone-app/.next/build-manifest.json 2>/dev/null || true
          cp .next/prerender-manifest.json standalone-app/.next/prerender-manifest.json 2>/dev/null || true
          cp .next/routes-manifest.json standalone-app/.next/routes-manifest.json 2>/dev/null || true

          # Copy public assets
          cp -r public standalone-app/public 2>/dev/null || true

          # Run script
          cat > standalone-app/run.sh << 'SCRIPT'
          #!/usr/bin/env bash
          PORT="${1:-3000}"
          echo "Starting ray.so on http://localhost:$PORT"
          cd "$(dirname "$0")"
          PORT="$PORT" HOSTNAME="0.0.0.0" node server.js
          SCRIPT
          chmod +x standalone-app/run.sh

          echo "Package size:" && du -sh standalone-app/
          echo "Key files:" && ls standalone-app/.next/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ray-so-standalone
          path: standalone-app/
          retention-days: 30
