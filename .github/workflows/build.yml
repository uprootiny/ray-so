name: Build & Deploy ray.so

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify standalone config
        run: grep -q '"standalone"' next.config.js && echo "standalone output configured"

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Package standalone
        run: |
          mkdir -p standalone-app
          if [ -d ".next/standalone" ]; then
            cp -r .next/standalone/* standalone-app/
            mkdir -p standalone-app/.next
            cp -r .next/static standalone-app/.next/static
            cp -r public standalone-app/public 2>/dev/null || true
            echo '#!/usr/bin/env bash' > standalone-app/run.sh
            echo 'PORT="${1:-3000}"' >> standalone-app/run.sh
            echo 'echo "Starting ray.so on http://localhost:$PORT"' >> standalone-app/run.sh
            echo 'cd "$(dirname "$0")"' >> standalone-app/run.sh
            echo 'PORT="$PORT" node server.js' >> standalone-app/run.sh
            chmod +x standalone-app/run.sh
          else
            echo "No standalone output — packaging full .next instead"
            cp -r .next standalone-app/.next
            cp package.json standalone-app/
            cp -r public standalone-app/public 2>/dev/null || true
            cp -r node_modules standalone-app/node_modules
            echo '#!/usr/bin/env bash' > standalone-app/run.sh
            echo 'PORT="${1:-3000}"' >> standalone-app/run.sh
            echo 'cd "$(dirname "$0")" && npx next start -p "$PORT"' >> standalone-app/run.sh
            chmod +x standalone-app/run.sh
          fi
          du -sh standalone-app/ && ls standalone-app/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ray-so-standalone
          path: standalone-app/
          retention-days: 30
