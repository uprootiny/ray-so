name: Build & Deploy ray.so

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify standalone config
        run: |
          echo "Checking next.config.js for output: standalone..."
          grep -q '"standalone"' next.config.js && echo "OK: standalone output configured" || {
            echo "Adding standalone output..."
            sed -i 's/const nextConfig = {/const nextConfig = {\n  output: "standalone",/' next.config.js
          }

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Verify standalone output exists
        run: |
          echo "Build output structure:"
          ls -la .next/ | head -20
          if [ -d ".next/standalone" ]; then
            echo "OK: standalone directory exists"
            ls -la .next/standalone/ | head -10
          else
            echo "ERROR: .next/standalone not found"
            echo "Available .next contents:"
            find .next -maxdepth 2 -type d
            exit 1
          fi

      - name: Package standalone artifact
        run: |
          mkdir -p standalone-app
          cp -r .next/standalone/* standalone-app/
          cp -r .next/static standalone-app/.next/static
          cp -r public standalone-app/public

          cat > standalone-app/run.sh << 'SCRIPT'
          #!/usr/bin/env bash
          PORT="${1:-3000}"
          echo "Starting ray.so on http://localhost:$PORT"
          cd "$(dirname "$0")"
          PORT="$PORT" node server.js
          SCRIPT
          chmod +x standalone-app/run.sh

      - name: Upload standalone artifact
        uses: actions/upload-artifact@v4
        with:
          name: ray-so-standalone
          path: standalone-app/
          retention-days: 30
